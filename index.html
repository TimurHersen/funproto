<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kadıköy — Daire Fiyat Haritası</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #0e0f13;
      --surface:  #16181f;
      --border:   #2a2d38;
      --gold:     #c9a84c;
      --gold-dim: #8a6e2f;
      --text:     #e8e4dc;
      --muted:    #7a7d8a;
      --red:      #e05c5c;
      --green:    #4caf7d;
      --blue:     #5b8dee;
      --panel-w:  380px;
      --header-h: 58px;
      --peek:     88px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100%; overflow:hidden; }

    .app { display:flex; flex-direction:column; height:100%; }

    /* ── Header ── */
    header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:0 20px; height:var(--header-h);
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; z-index:1000;
    }
    .logo { display:flex; align-items:baseline; gap:8px; }
    .logo h1 { font-family:'Playfair Display',serif; font-size:1.15rem; color:var(--gold); }
    .logo span { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
    .header-right { display:flex; align-items:center; gap:10px; font-size:0.72rem; color:var(--muted); }
    .badge { background:rgba(201,168,76,0.12); border:1px solid var(--gold-dim); color:var(--gold); padding:3px 9px; border-radius:20px; font-size:0.65rem; letter-spacing:0.08em; text-transform:uppercase; white-space:nowrap; }
    .header-addr { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:170px; }

    /* ── Main ── */
    .main { flex:1; display:flex; overflow:hidden; position:relative; }
    #map { flex:1; z-index:1; }

    /* ── Desktop sidebar ── */
    #sidebar {
      width:var(--panel-w); background:var(--surface); border-left:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
      transition:width 0.3s cubic-bezier(.4,0,.2,1); z-index:500; flex-shrink:0;
    }
    #sidebar.collapsed { width:0; }
    .sidebar-inner { position:relative; height:100%; display:flex; flex-direction:column; overflow:hidden; }
    #collapse-btn {
      position:absolute; top:50%; right:0;
      transform:translateY(-50%) translateX(100%);
      background:var(--surface); border:1px solid var(--border); border-left:none;
      color:var(--muted); cursor:pointer; padding:8px 5px;
      border-radius:0 4px 4px 0; font-size:0.85rem; z-index:600; line-height:1;
    }
    #collapse-btn:hover { color:var(--gold); }

    /* ── Mobile bottom sheet ── */
    #bottom-sheet {
      display:none;
      position:fixed; bottom:0; left:0; right:0;
      background:var(--surface); border-top:1px solid var(--border);
      border-radius:16px 16px 0 0; z-index:900;
      transition:transform 0.35s cubic-bezier(.4,0,.2,1);
      transform:translateY(100%);
      max-height:85vh; flex-direction:column;
    }
    #bottom-sheet.peek  { transform:translateY(calc(100% - var(--peek))); }
    #bottom-sheet.open  { transform:translateY(0); }

    .sheet-handle {
      flex-shrink:0; display:flex; align-items:center; justify-content:center;
      padding:10px 0 6px; cursor:pointer;
    }
    .sheet-handle::before { content:''; width:36px; height:4px; background:var(--border); border-radius:2px; }

    .sheet-peek-row {
      flex-shrink:0; padding:4px 20px 12px;
      display:flex; justify-content:space-between; align-items:center; cursor:pointer;
    }
    .peek-name { font-family:'Playfair Display',serif; font-size:1rem; }
    .peek-price { font-size:0.78rem; color:var(--gold); margin-top:2px; }
    .peek-caret { font-size:0.75rem; color:var(--muted); }

    .sheet-body { flex:1; overflow-y:auto; overflow-x:hidden; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; }

    /* ── Shared content ── */
    .panel-header { padding:16px 20px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .area-name { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--text); }
    .area-sub { font-size:0.72rem; color:var(--muted); margin-top:2px; }
    .price-hero { display:flex; align-items:baseline; flex-wrap:wrap; gap:4px; margin-top:10px; }
    .price-hero .big { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--gold); line-height:1; }
    .price-hero .unit { font-size:0.75rem; color:var(--muted); }
    .price-change { display:inline-flex; align-items:center; font-size:0.72rem; padding:2px 8px; border-radius:12px; margin-left:4px; }
    .price-change.up { background:rgba(76,175,125,0.15); color:var(--green); }
    .price-change.dn { background:rgba(224,92,92,0.12); color:var(--red); }
    .area-desc { font-size:0.73rem; color:var(--muted); margin-top:8px; line-height:1.55; }

    .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); border-top:1px solid var(--border); border-bottom:1px solid var(--border); flex-shrink:0; }
    .stat-cell { background:var(--surface); padding:12px 10px; text-align:center; }
    .stat-cell .val { font-size:0.95rem; font-weight:500; }
    .stat-cell .lbl { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; margin-top:2px; }

    .panel-body { flex:1; overflow-y:auto; padding:16px 20px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

    .chart-block { margin-bottom:20px; }
    .chart-title { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:9px; display:flex; align-items:center; gap:6px; }
    .chart-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .chart-wrap { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px; }

    .listing-tag { display:inline-block; font-size:0.66rem; padding:4px 9px; border-radius:4px; border:1px solid var(--border); color:var(--muted); margin:2px 3px; }
    .listing-tag.active { border-color:var(--gold-dim); color:var(--gold); background:rgba(201,168,76,0.08); }

    .placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; gap:10px; color:var(--muted); }
    .placeholder .icon { font-size:1.8rem; opacity:0.4; }
    .placeholder p { font-size:0.8rem; line-height:1.6; }

    /* ── Legend ── */
    .legend {
      position:absolute; bottom:20px; left:14px;
      background:rgba(22,24,31,0.93); border:1px solid var(--border);
      border-radius:8px; padding:10px 14px; z-index:800; backdrop-filter:blur(8px);
    }
    .legend-title { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:7px; }
    .legend-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; font-size:0.68rem; color:var(--text); }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

    /* Leaflet overrides */
    .leaflet-popup-content-wrapper { background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); box-shadow:0 8px 32px rgba(0,0,0,0.6); }
    .leaflet-popup-tip { background:var(--surface); }
    .leaflet-popup-content { margin:10px 14px; font-family:'DM Sans',sans-serif; }
    .leaflet-container { background:#0a0b0e; }
    .leaflet-control-zoom { border:1px solid var(--border) !important; }
    .leaflet-control-zoom a { background:var(--surface) !important; color:var(--text) !important; border-color:var(--border) !important; }

    /* ── Lang toggle ── */
    .lang-toggle {
      display:flex; align-items:center;
      background:var(--bg); border:1px solid var(--border);
      border-radius:20px; overflow:hidden; flex-shrink:0;
    }
    .lang-btn {
      padding:4px 10px; font-size:0.68rem; font-weight:500; letter-spacing:0.06em;
      cursor:pointer; border:none; background:transparent; color:var(--muted);
      transition:all 0.2s; font-family:'DM Sans',sans-serif;
    }
    .lang-btn.active { background:var(--gold); color:#0e0f13; }
    .lang-btn:hover:not(.active) { color:var(--text); }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ── Mobile ── */
    @media (max-width:700px) {
      :root { --header-h:50px; }
      header { padding:0 14px; }
      .logo h1 { font-size:1rem; }
      .logo span { display:none; }
      .header-addr { display:none; }
      #sidebar { display:none !important; }
      #bottom-sheet { display:flex; }
      .legend { bottom:calc(var(--peek) + 12px); left:10px; padding:8px 10px; }
      .legend-title { font-size:0.55rem; }
      .legend-row { font-size:0.62rem; margin-bottom:3px; }
      .legend-dot { width:8px; height:8px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <h1>PropMap Istanbul</h1>
      <span>Kadıköy</span>
    </div>
    <div class="header-right">
      <span class="header-addr" id="header-addr">📍 Reşitpaşa Sok. No:10</span>
      <span class="badge" id="header-badge">Mock Data</span>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-tr" onclick="setLang('tr')">TR</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>

  <div class="main">

    <!-- Desktop sidebar -->
    <div id="sidebar">

        <button id="collapse-btn" onclick="toggleSidebar()">›</button>
        <div id="desk-content">
          <div class="placeholder"><div class="icon">🗺️</div><p>Mahalle bilgilerini görmek için haritada bir noktaya tıklayın.</p></div>

  <!-- Mobile bottom sheet -->
  <div id="bottom-sheet">
    <div class="sheet-handle" id="sheet-handle"></div>
    <div class="sheet-peek-row" id="sheet-peek-row">
      <div id="peek-text">
        <div class="peek-name" style="color:var(--muted);font-size:0.85rem">Mahalle seçin</div>
        <div class="peek-price">Haritaya dokunun ↑</div>
      </div>
      <div class="peek-caret" id="peek-caret">▲</div>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-title" id="leg-title">Fiyat / m²</div>
  <div class="legend-row"><div class="legend-dot" style="background:#e05c5c"></div>90K ₺+</div>

  <div class="legend-row" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
    <div class="legend-dot" style="background:#c9a84c;border:2px solid #fff;width:12px;height:12px"></div>
    <span id="leg-target">Hedef</span>
  </div>
</div>

<script>

const TARGET = { lat:40.9893, lng:29.0261 };

// ── Translations ────────────────────────────────────────────
let lang = "tr";
const T = {
  tr: {
    subtitle:     "Kadıköy",
    addr:         "📍 Reşitpaşa Sok. No:10",
    badge:        "Mock Data",
    placeholder:  "Mahalle bilgilerini görmek için haritada bir noktaya tıklayın.",

    yearly:       "yıllık",

    avgPrice:     "Avg. Price",
    trend:        "Price Trend (6 Mo.)",
    byRoom:       "Listings by Room Type",
    priceRange:   "Price Range",
    roomTypes:    "Room Types",
    legendTitle:  "Price / m²",
    legendTarget: "Target",
    peekSelect:   "Select area",
    peekTap:      "Tap the map ↑",
    months:       ["Nov","Dec","Jan","Feb","Mar","Apr","May"]
  }
};
const chartReg = {};

function color(p) {
  if (p>=90000) return "#e05c5c";
  if (p>=70000) return "#e08c3c";
  if (p>=55000) return "#c9a84c";
  return "#4caf7d";
}
function fmt(n) { return n.toLocaleString("tr-TR"); }

function killCharts() {
  Object.values(chartReg).forEach(c=>{ try{c.destroy();}catch(e){} });
  Object.keys(chartReg).forEach(k=>delete chartReg[k]);
}

function mkCharts(nb, sfx) {
  const tEl = document.getElementById("tc_"+sfx);
  const rEl = document.getElementById("rc_"+sfx);
  if (!tEl||!rEl) return;
  chartReg["t"+sfx] = new Chart(tEl, {
    type:"line",
    data:{ labels:T[lang].months, datasets:[{ data:nb.trend.map(v=>v*1000), borderColor:"#c9a84c", backgroundColor:"rgba(201,168,76,0.08)", borderWidth:2, pointRadius:3, pointBackgroundColor:"#c9a84c", fill:true, tension:0.4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:"#7a7d8a",font:{size:9}},grid:{color:"#1f2130"}}, y:{ticks:{color:"#7a7d8a",font:{size:9},callback:v=>(v/1000).toFixed(0)+"K"},grid:{color:"#1f2130"}} } }
  });
  chartReg["r"+sfx] = new Chart(rEl, {
    type:"bar",
    data:{ labels:Object.keys(nb.rooms), datasets:[{ data:Object.values(nb.rooms), backgroundColor:["rgba(91,141,238,0.7)","rgba(201,168,76,0.7)","rgba(76,175,125,0.7)","rgba(224,92,92,0.7)"], borderRadius:4, borderSkipped:false }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:"#7a7d8a",font:{size:9}},grid:{color:"#1f2130"}}, y:{ticks:{color:"#7a7d8a",font:{size:9}},grid:{color:"#1f2130"}} } }
  });
}

function panelHTML(nb, sfx) {
  const t = T[lang];
  const dir = nb.ch>=0?"up":"dn";
  return `
  <div class="panel-header">
    <div class="area-name">${nb.name}</div>
    <div class="area-sub">${t.district}</div>
    <div class="price-hero">
      <div class="big">${fmt(nb.p)} ₺</div>
      <div class="unit">/m²</div>
      <div class="price-change ${dir}">${nb.ch>=0?"+":""}${nb.ch}% ${t.yearly}</div>
    </div>
    <div class="area-desc">${nb.desc[lang]}</div>
  </div>
  <div class="stats-row">
    <div class="stat-cell"><div class="val">${nb.n}</div><div class="lbl">${t.listings}</div></div>
    <div class="stat-cell"><div class="val">${nb.sz} m²</div><div class="lbl">${t.avgSize}</div></div>
    <div class="stat-cell"><div class="val">${(nb.p*nb.sz/1000000).toFixed(1)}M ₺</div><div class="lbl">${t.avgPrice}</div></div>
  </div>
  <div class="panel-body">
    <div class="chart-block">
      <div class="chart-title">${t.trend}</div>
      <div class="chart-wrap" style="height:130px"><canvas id="tc_${sfx}"></canvas></div>
    </div>
    <div class="chart-block">
      <div class="chart-title">${t.byRoom}</div>
      <div class="chart-wrap" style="height:120px"><canvas id="rc_${sfx}"></canvas></div>
    </div>
    <div class="chart-block">
      <div class="chart-title">${t.priceRange}</div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 14px">
        <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--muted);margin-bottom:5px"><span>Min</span><span>Max</span></div>
        <div style="display:flex;justify-content:space-between;font-size:0.85rem;font-weight:500">
          <span style="color:var(--green)">${nb.mn.toFixed(1)}M ₺</span>
          <span style="color:var(--red)">${nb.mx.toFixed(1)}M ₺</span>
        </div>
        <div style="margin-top:7px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
          <div style="height:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));opacity:0.6"></div>
        </div>
      </div>
    </div>
    <div class="chart-block" style="margin-bottom:0">
      <div class="chart-title">${t.roomTypes}</div>
      <div>${Object.entries(nb.rooms).map(([k,v])=>`<span class="listing-tag active">${k}: ${v}</span>`).join("")}</div>
    </div>
  </div>`;
}

// ── Open ────────────────────────────────────────────────────
let currentNb = null;

function open(nb) {
  currentNb = nb;
  killCharts();
  const mobile = window.innerWidth <= 700;
  const t = T[lang];

  if (mobile) {
    document.getElementById("peek-text").innerHTML = `
      <div class="peek-name">${nb.name}</div>
      <div class="peek-price">${fmt(nb.p)} ₺/m² &nbsp;<span style="color:var(--green)">+${nb.ch}%</span></div>`;
    document.getElementById("sheet-body").innerHTML = panelHTML(nb, "m");
    const sheet = document.getElementById("bottom-sheet");
    sheet.className = "peek";
    sheetState = "peek";
    document.getElementById("peek-caret").textContent = "▲";
    setTimeout(() => mkCharts(nb, "m"), 60);
  } else {
    document.getElementById("desk-content").innerHTML = panelHTML(nb, "d");
    document.getElementById("sidebar").classList.remove("collapsed");
    document.getElementById("collapse-btn").textContent = "›";
    sidebarOpen = true;
    setTimeout(() => mkCharts(nb, "d"), 50);
  }
}

// ── Language switch ─────────────────────────────────────────
function setLang(l) {
  lang = l;
  const t = T[l];

  // Toggle button states
  document.getElementById("btn-tr").classList.toggle("active", l==="tr");
  document.getElementById("btn-en").classList.toggle("active", l==="en");

  // Header static text
  document.getElementById("header-addr").textContent = t.addr;
  document.getElementById("header-badge").textContent = t.badge;

  // Legend
  document.getElementById("leg-title").textContent = t.legendTitle;
  document.getElementById("leg-target").textContent = t.legendTarget;

  // Re-render panel if one is open, otherwise update placeholder
  if (currentNb) {
    open(currentNb);
  } else {
    const ph = `<div class="placeholder"><div class="icon">🗺️</div><p>${t.placeholder}</p></div>`;
    document.getElementById("desk-content").innerHTML = ph;
    // Mobile idle peek
    document.getElementById("peek-text").innerHTML = `
      <div class="peek-name" style="color:var(--muted);font-size:0.85rem">${t.peekSelect}</div>
      <div class="peek-price">${t.peekTap}</div>`;
  }
}

// ── Desktop sidebar ─────────────────────────────────────────
let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed", !sidebarOpen);
  document.getElementById("collapse-btn").textContent = sidebarOpen ? "›" : "‹";
}

// ── Mobile sheet ────────────────────────────────────────────
let sheetState = "hidden"; // hidden | peek | open

function setSheet(state) {
  sheetState = state;
  const sheet = document.getElementById("bottom-sheet");
  sheet.className = state;
  document.getElementById("peek-caret").textContent = state === "open" ? "▼" : "▲";
}

document.getElementById("sheet-handle").addEventListener("click", () => {
  if (sheetState === "peek") setSheet("open");
  else if (sheetState === "open") setSheet("peek");
});

document.getElementById("sheet-peek-row").addEventListener("click", () => {
  if (sheetState === "peek") setSheet("open");
  else if (sheetState === "open") setSheet("peek");
});

// Touch drag
(function(){
  const sheet = document.getElementById("bottom-sheet");
  let sy=0, baseY=0, dragging=false;
  function currentY() {
    const m = getComputedStyle(sheet).transform.match(/matrix.*\((.+)\)/);
    return m ? parseFloat(m[1].split(", ")[5]) : 0;
  }
  sheet.addEventListener("touchstart", e => { sy=e.touches[0].clientY; baseY=currentY(); dragging=true; sheet.style.transition="none"; }, {passive:true});
  sheet.addEventListener("touchmove", e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - sy;
    sheet.style.transform = `translateY(${Math.max(0,baseY+dy)}px)`;
  }, {passive:true});
  sheet.addEventListener("touchend", () => {
    dragging=false; sheet.style.transition="";
    const cur = currentY();
    setSheet(cur < sheet.offsetHeight*0.4 ? "open" : "peek");
    sheet.style.transform="";
  });
})();

// ── Map ─────────────────────────────────────────────────────
const map = L.map("map", { center:[40.985,29.035], zoom:13, zoomControl:false, tap:true });
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { attribution:'© CARTO © OSM', maxZoom:19 }).addTo(map);
L.control.zoom({ position:"topleft" }).addTo(map);

DATA.forEach(nb => {
  const c = color(nb.p);
  const r = 180 + (nb.n/600)*280;
  const circle = L.circle([nb.lat,nb.lng], { radius:r, color:c, fillColor:c, fillOpacity:0.22, weight:1.5, opacity:0.7 }).addTo(map);

  L.marker([nb.lat,nb.lng], { icon: L.divIcon({ className:"", html:`<div style="background:rgba(14,15,19,0.88);border:1px solid ${c};color:${c};font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;padding:3px 7px;border-radius:4px;white-space:nowrap;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,0.5)">${nb.name}<br><span style="font-size:9px;opacity:0.8">${(nb.p/1000).toFixed(0)}K ₺/m²</span></div>`, iconAnchor:[0,0] }), interactive:false }).addTo(map);

  circle.on("click", () => open(nb));
  circle.on("mouseover", function(){ this.setStyle({fillOpacity:0.42,weight:2.5}); });
  circle.on("mouseout",  function(){ this.setStyle({fillOpacity:0.22,weight:1.5}); });
});

// Target pin
L.marker([TARGET.lat,TARGET.lng], { icon: L.divIcon({ className:"", html:`<div style="display:flex;flex-direction:column;align-items:center"><div style="background:#c9a84c;color:#0e0f13;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.5)">📍 Reşitpaşa Sok. No:10</div><div style="width:2px;height:8px;background:#c9a84c;margin-top:2px"></div><div style="width:7px;height:7px;border-radius:50%;background:#c9a84c;box-shadow:0 0 10px #c9a84c88"></div></div>`, iconAnchor:[65,28] }), zIndexOffset:1000 }).addTo(map).on("click", ()=>open(DATA.find(n=>n.id==="resitpasa")));

setTimeout(()=>open(DATA.find(n=>n.id==="resitpasa")), 500);
window.addEventListener("resize", ()=>map.invalidateSize());
</script>
</body>
